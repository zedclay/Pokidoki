            Skip

</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col justify-between px-page-padding pb-section pt-lg relative z-10">
<!-- Illustration Container -->
<div class="flex-1 flex items-center justify-center w-full max-h-[50vh] relative">
<div class="relative w-full max-w-sm aspect-square flex items-center justify-center">
<!-- The glowing orb background effect -->
<div class="absolute inset-0 bg-primary-container/20 blur-[80px] rounded-full pointer-events-none"></div>

</div>
</div>
<!-- Typography & Paging Section -->
<div class="flex flex-col items-center text-center mt-xl mb-xxl shrink-0">
<h1 class="font-headline-md text-headline-md text-on-background mb-lg">
                Know who you are talking to
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm mx-auto">
                Verify trusted contacts using a QR code or safety number before sharing sensitive information.
            </p>
<!-- Progress Indicators -->
<div class="flex items-center justify-center gap-sm mt-xxl h-[24px]">
<div class="w-2 h-2 rounded-full bg-surface-variant transition-colors duration-300"></div>
<div class="w-6 h-2 rounded-full bg-primary transition-all duration-300"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant transition-colors duration-300"></div>
</div>
</div>

<div class="w-full shrink-0">
<button class="w-full h-[52px] bg-[#7C6CFF] text-on-primary font-label-md text-label-md uppercase rounded-[14px] hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center shadow-[0_0_20px_rgba(124,108,255,0.15)] focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background">
