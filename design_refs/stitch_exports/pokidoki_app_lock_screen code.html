<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Pokidoki - Lock Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#161c25",
                        "surface-bright": "#343943",
                        "secondary": "#40dfa8",
                        "surface-container": "#1a2029",
                        "error-container": "#93000a",
                        "surface-tint": "#c6bfff",
                        "on-tertiary-container": "#412200",
                        "on-secondary-container": "#004933",
                        "on-primary-container": "#22008d",
                        "on-secondary": "#003827",
                        "background": "#0e141c",
                        "on-background": "#dee2ef",
                        "surface-variant": "#30353f",
                        "primary-container": "#8c80ff",
                        "on-surface": "#dee2ef",
                        "secondary-fixed-dim": "#40dfa8",
                        "on-primary-fixed": "#160066",
                        "secondary-fixed": "#64fcc3",
                        "surface-container-high": "#252a34",
                        "outline-variant": "#474554",
                        "on-secondary-fixed": "#002115",
                        "tertiary": "#ffb875",
                        "primary-fixed": "#e4dfff",
                        "on-tertiary": "#4b2800",
                        "outline": "#928ea0",
                        "tertiary-fixed": "#ffdcc0",
                        "secondary-container": "#00c28e",
                        "on-error-container": "#ffdad6",
                        "surface-container-highest": "#30353f",
                        "on-primary-fixed-variant": "#3f25c1",
                        "surface": "#0e141c",
                        "on-secondary-fixed-variant": "#005139",
                        "inverse-surface": "#dee2ef",
                        "surface-container-lowest": "#090e17",
                        "inverse-on-surface": "#2b313a",
                        "on-tertiary-fixed-variant": "#6b3b00",
                        "error": "#ffb4ab",
                        "on-surface-variant": "#c8c4d7",
                        "on-error": "#690005",
                        "on-primary": "#2800a0",
                        "primary-fixed-dim": "#c6bfff",
                        "inverse-primary": "#5845d9",
                        "tertiary-fixed-dim": "#ffb875",
                        "primary": "#c6bfff",
                        "tertiary-container": "#d27c17",
                        "on-tertiary-fixed": "#2d1600",
                        "surface-dim": "#0e141c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xxl": "32px",
                        "section": "48px",
                        "lg": "16px",
                        "xs": "4px",
                        "page-padding": "20px",
                        "md": "12px",
                        "xl": "24px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "display-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "title-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "headline-sm": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "title-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #090B10; /* Enforced absolute dark background, ignoring standard surface tokens for lock screen isolation */
            color: #dee2ef; /* on-background */
        }
        
        .keypad-btn {
            width: 72px;
            height: 72px;
            background-color: #191D26; /* Elevated surface for buttons */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
            cursor: pointer;
            user-select: none;
        }
        
        .keypad-btn:active {
            background-color: #252a34; /* surface-container-high on press */
            transform: scale(0.95);
        }
        
        .keypad-btn.action {
            background-color: transparent;
        }
        
        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            transition: all 0.2s ease-in-out;
        }
        
        .pin-dot.filled {
            background-color: #7C6CFF; /* Primary accent */
            border: 2px solid #7C6CFF;
        }
        
        .pin-dot.empty {
            background-color: transparent;
            border: 2px solid #474554; /* outline-variant */
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-between font-body-lg text-body-lg select-none">
<!-- Top Utility Area -->
<div class="w-full max-w-md px-page-padding py-lg flex justify-end items-center">
<button aria-label="Help" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-variant/20 transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" style="font-size: 24px;">help</span>
</button>
</div>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md flex flex-col items-center justify-center px-page-padding pb-section">
<!-- Brand & User Identity -->
<div class="flex flex-col items-center mb-xl space-y-md">
<h1 class="font-headline-md text-headline-md text-primary mb-md">Pokidoki</h1>
<div class="w-20 h-20 rounded-full bg-surface-container-high border-2 border-outline-variant flex items-center justify-center shadow-lg relative overflow-hidden">
<span class="font-headline-sm text-headline-sm text-on-surface-variant">ZC</span>
<!-- Subtle glass overlay for premium feel -->
<div class="absolute inset-0 bg-white/5 backdrop-blur-[2px]"></div>
</div>
<div class="text-center">
<h2 class="font-title-md text-title-md text-on-surface">Zed Clay</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant opacity-80">@zedclay</p>
</div>
</div>
<!-- Lock Status & Instructions -->
<div class="text-center mb-xxl max-w-[320px]">
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-sm">Pokidoki is locked</h3>
<p class="font-body-lg text-body-lg text-on-surface-variant">Enter your six-digit app PIN or use biometrics to access your conversations.</p>
</div>
<!-- PIN Indicators -->
<div class="flex items-center justify-center space-x-md mb-lg">
<div class="pin-dot filled"></div>
<div class="pin-dot filled"></div>
<div class="pin-dot empty"></div>
<div class="pin-dot empty"></div>
<div class="pin-dot empty"></div>
<div class="pin-dot empty"></div>
</div>
<!-- Feedback Area -->
<div class="font-label-md text-label-md text-on-surface-variant mb-xl h-6 flex items-center justify-center">
<span>Enter your app PIN</span>
</div>
<!-- Numeric Keypad -->
<div class="grid grid-cols-3 gap-x-xl gap-y-lg mb-xl">
<!-- Row 1 -->
<div class="keypad-btn font-headline-sm text-headline-sm text-on-surface">1</div>
<div class="keypad-btn font-headline-sm text-headline-sm text-on-surface">2</div>
<div class="keypad-btn font-headline-sm text-headline-sm text-on-surface">3</div>
<!-- Row 2 -->
<div class="keypad-btn font-headline-sm text-headline-sm text-on-surface">4</div>
<div class="keypad-btn font-headline-sm text-headline-sm text-on-surface">5</div>
<div class="keypad-btn font-headline-sm text-headline-sm text-on-surface">6</div>
<!-- Row 3 -->
<div class="keypad-btn font-headline-sm text-headline-sm text-on-surface">7</div>
<div class="keypad-btn font-headline-sm text-headline-sm text-on-surface">8</div>
<div class="keypad-btn font-headline-sm text-headline-sm text-on-surface">9</div>
<!-- Row 4 -->
<div class="keypad-btn action text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 32px;">fingerprint</span>
</div>
<div class="keypad-btn font-headline-sm text-headline-sm text-on-surface">0</div>
<div class="keypad-btn action text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" style="font-size: 28px;">backspace</span>
</div>
</div>
<!-- Recovery Action -->
<button class="font-label-md text-label-md text-[#7C6CFF] hover:underline px-lg py-sm rounded-full focus:outline-none focus:ring-2 focus:ring-[#7C6CFF] focus:ring-opacity-50">
            Forgot your app PIN?
        </button>
</main>
<script>
        // Micro-interactions for keypad visual feedback
        document.querySelectorAll('.keypad-btn:not(.action)').forEach(btn => {
            btn.addEventListener('click', () => {
                // In a real app, this would trigger PIN logic. 
                // For UI demo, just add a subtle pulse effect.
                btn.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    btn.style.transform = 'scale(1)';
                }, 100);
            });
        });
    </script>
</body></html>
