<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Pokidoki - Sign In</title>

                      "primary-fixed-dim": "#c6bfff",
                      "on-tertiary-fixed-variant": "#6b3b00",

                      "surface": "#0e141c",
                      "primary-fixed": "#e4dfff",
                      "inverse-surface": "#dee2ef",
                      "surface-dim": "#0e141c",
                      "on-tertiary": "#4b2800",
                      "on-primary-container": "#22008d",
                      "primary-container": "#8c80ff",
                      "primary": "#c6bfff",
                      "on-surface": "#dee2ef",
                      "on-primary-fixed-variant": "#3f25c1",

                      "secondary-container": "#00c28e",

<style>
        body {
            background-color: #090B10; /* Level 0 */
            color: #dee2ef;
            font-family: 'Inter', sans-serif;
        }
        
        /* Form Inputs */
        .glass-input {
            background-color: #12151C;
            border: 1px solid #292E39;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .glass-input:focus-within {
            border-color: #7C6CFF;
            box-shadow: 0 0 0 1px #7C6CFF;
        }

        /* Ambient Shadow */
        .glow-shadow {
            box-shadow: 0 4px 24px -4px rgba(124, 108, 255, 0.15);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pt-8 pb-section">
<!-- TopAppBar -->
<header class="w-full max-w-md flex items-center justify-between px-page-padding h-[64px] shrink-0">
<button aria-label="Go back" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors active:scale-95 text-primary group">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="font-title-md text-title-md text-on-surface">Sign in</h1>
<div class="w-12 h-12"></div> <!-- Spacer for centering -->
</header>
<main class="w-full max-w-md px-page-padding flex-1 flex flex-col mt-xl">
<!-- Brand & Intro -->
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-surface-container-low rounded-2xl flex items-center justify-center mb-md glow-shadow relative overflow-hidden">
<!-- Subtle glass effect inside logo -->
<div class="absolute inset-0 bg-white/5 backdrop-blur-sm"></div>
<span class="material-symbols-outlined text-primary text-4xl relative z-10" data-weight="fill" style="font-variation-settings: 'FILL' 1;">encrypted</span>
</div>
<h2 class="font-headline-md text-headline-md text-primary tracking-tight">Pokidoki</h2>
</div>
<div class="mb-xl text-left">
<h3 class="font-headline-sm text-headline-sm text-[#F7F7FA] mb-xs">Welcome back</h3>
<p class="font-body-lg text-body-lg text-[#A7ACB8]">Sign in to access your private conversations.</p>
</div>
<!-- Sign-in Form -->
<form class="flex flex-col gap-lg mb-section">
<!-- Email/Username Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="username">Email or username</label>
<div class="relative glass-input rounded-[14px] h-[52px] flex items-center px-lg">
<span class="material-symbols-outlined text-outline mr-md">person</span>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant h-full" id="username" placeholder="Enter your email or username" type="text" value="@zedclay">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<div class="relative glass-input rounded-[14px] h-[52px] flex items-center px-lg">
<span class="material-symbols-outlined text-outline mr-md">lock</span>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant h-full" id="password" placeholder="Enter your password" type="password" value="••••••••••••">
<button aria-label="Toggle password visibility" class="ml-md text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Form Actions Row -->
<div class="flex items-center justify-between mt-sm">
<label class="flex items-center gap-sm cursor-pointer group">
<div class="relative flex items-center justify-center w-5 h-5">
<input class="peer appearance-none w-5 h-5 border-2 border-outline-variant rounded focus:ring-0 focus:ring-offset-0 checked:bg-primary-container checked:border-primary-container transition-all" type="checkbox">
<span class="material-symbols-outlined text-on-primary-container text-sm absolute opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember this device</span>
</label>
<a class="font-label-md text-label-md text-[#7C6CFF] hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<!-- Primary Action -->
<button class="w-full h-[52px] bg-[#7C6CFF] text-white font-label-md text-label-md uppercase tracking-wider rounded-[14px] mt-md glow-shadow active:scale-95 transition-all focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background" type="submit">
                Sign in
            </button>
<!-- Divider -->
<div class="flex items-center gap-md my-md">
<div class="h-px bg-surface-variant flex-1"></div>
<span class="font-label-md text-label-md text-outline-variant">Or continue securely</span>
<div class="h-px bg-surface-variant flex-1"></div>
</div>
<!-- Secondary Action -->
<button class="w-full h-[52px] bg-transparent border-[1.5px] border-surface-variant text-on-surface font-label-md text-label-md rounded-[14px] flex items-center justify-center gap-sm hover:bg-surface-container-low active:scale-95 transition-all focus:outline-none focus:ring-2 focus:ring-surface-variant" type="button">
<span class="material-symbols-outlined text-primary">fingerprint</span>
                Use fingerprint
            </button>
</form>
</main>
<!-- Footer -->
<footer class="w-full max-w-md px-page-padding flex flex-col items-center gap-lg mt-auto pb-lg">
<p class="font-body-lg text-body-lg text-on-surface-variant">
            New to Pokidoki? <a class="text-[#7C6CFF] font-title-md hover:text-primary transition-colors ml-xs" href="#">Create an account</a>
</p>
<div class="flex items-start gap-xs text-[#A7ACB8] max-w-xs text-center">
<span class="material-symbols-outlined text-sm mt-xs opacity-70">info</span>
<p class="font-label-md text-label-md text-xs leading-relaxed opacity-70">
                Pokidoki never stores your password in readable form.
            </p>
</div>
</footer>
</body></html>
