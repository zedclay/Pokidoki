<style>
        /* Camera overlay effect */
        .camera-overlay {
            background: rgba(9, 11, 16, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* Scanning frame */
        .scan-frame {
            position: relative;
            width: 270px;
            height: 270px;
            border-radius: 24px;
            box-shadow: 0 0 0 9999px rgba(9, 11, 16, 0.75);
            /* Corner markers */
        }

        .scan-frame::before,
        .scan-frame::after {
            content: '';
            position: absolute;
            width: 48px;
            height: 48px;
            border-color: #c6bfff; /* Primary color */
            border-style: solid;
        }

        /* Top Left & Bottom Right */
        .scan-frame::before {
            top: -2px;
            left: -2px;
            border-width: 4px 0 0 4px;
            border-top-left-radius: 24px;
        }
        /* Top Right & Bottom Left - handled by extra divs to avoid pseudo element conflict if needed, or composite shadow approach */
        .corner-tr {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 48px;
            height: 48px;
            border-color: #c6bfff;
            border-width: 4px 4px 0 0;
            border-top-right-radius: 24px;
        }
        .corner-bl {
            position: absolute;
            bottom: -2px;
            left: -2px;
            width: 48px;
            height: 48px;
            border-color: #c6bfff;
            border-width: 0 0 4px 4px;
            border-bottom-left-radius: 24px;
        }
        .corner-br {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 48px;
            height: 48px;
            border-color: #c6bfff;
            border-width: 0 4px 4px 0;
            border-bottom-right-radius: 24px;
        }


        /* Scanning Line Animation */
        @keyframes scan {
            0% {
                transform: translateY(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(270px);
                opacity: 0;
            }
        }
        .scan-line {
            position: absolute;
            top: 0;
            left: 5%;
            width: 90%;
            height: 2px;
            background: #c6bfff;
            box-shadow: 0 0 8px 2px rgba(198, 191, 255, 0.5);
            animation: scan 2.5s infinite linear;
            z-index: 10;
        }

        /* Pulsing Dot */
        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(198, 191, 255, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 6px rgba(198, 191, 255, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(198, 191, 255, 0);
            }
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #c6bfff;
            animation: pulse 2s infinite;
        }

        /* Glass Utility Buttons */
        .glass-btn {
            background: rgba(48, 53, 63, 0.4); /* surface-container-highest/40 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .glass-panel {
            background: rgba(37, 42, 52, 0.6); /* surface-container-high with opacity */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>

<body class="bg-background text-on-background font-body-lg h-screen w-full overflow-hidden flex flex-col relative antialiased selection:bg-primary selection:text-on-primary">

<span class="material-symbols-outlined text-[20px]" data-icon="help" data-weight="regular">help</span>
</button>
</header>
<!-- Main Scanner Area -->
<main class="flex-1 flex flex-col items-center justify-center relative z-10 w-full h-full px-page-padding pt-24 pb-32 pointer-events-none">
<!-- Instructions -->
<div class="text-center mb-10 max-w-sm px-4">
<h2 class="font-title-md-mobile text-title-md-mobile text-on-surface mb-2">Scan a Pokidoki QR code</h2>
<p class="font-body-lg-mobile text-body-lg-mobile text-on-surface-variant">Place the code inside the frame to add or verify someone</p>
</div>
<!-- Scanner Frame Container -->
<div class="relative w-[270px] h-[270px] mb-8">
<div class="scan-frame rounded-[24px] bg-transparent">

<div class="corner-tr"></div>
<div class="corner-bl"></div>
<div class="corner-br"></div>
<!-- Animated Line -->

</div>
<!-- Clear Center Mask (CSS magic using box-shadow on scan-frame handles the overlay, so the center is automatically clear) -->
</div>
<!-- Feedback indicator -->
