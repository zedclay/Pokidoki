<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Pokidoki - Verify Email</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "secondary": "#40dfa8",
                      "on-background": "#dee2ef",
                      "on-tertiary-container": "#412200",
                      "on-error": "#690005",
                      "inverse-surface": "#dee2ef",
                      "surface-variant": "#30353f",
                      "on-tertiary": "#4b2800",
                      "surface-container-low": "#161c25",
                      "inverse-on-surface": "#2b313a",
                      "secondary-fixed": "#64fcc3",
                      "on-surface-variant": "#c8c4d7",
                      "error-container": "#93000a",
                      "surface-tint": "#c6bfff",
                      "primary-fixed": "#e4dfff",
                      "surface": "#0e141c",
                      "background": "#0e141c",
                      "on-secondary-fixed": "#002115",
                      "on-tertiary-fixed": "#2d1600",
                      "on-tertiary-fixed-variant": "#6b3b00",
                      "on-primary-fixed": "#160066",
                      "tertiary-fixed-dim": "#ffb875",
                      "secondary-container": "#00c28e",
                      "on-surface": "#dee2ef",
                      "surface-bright": "#343943",
                      "on-secondary-fixed-variant": "#005139",
                      "on-error-container": "#ffdad6",
                      "error": "#ffb4ab",
                      "outline": "#928ea0",
                      "on-secondary-container": "#004933",
                      "on-primary": "#2800a0",
                      "primary": "#c6bfff",
                      "tertiary": "#ffb875",
                      "on-primary-container": "#22008d",
                      "outline-variant": "#474554",
                      "on-secondary": "#003827",
                      "surface-dim": "#0e141c",
                      "primary-fixed-dim": "#c6bfff",
                      "on-primary-fixed-variant": "#3f25c1",
                      "tertiary-container": "#d27c17",
                      "inverse-primary": "#5845d9",
                      "surface-container-highest": "#30353f",
                      "surface-container": "#1a2029",
                      "surface-container-high": "#252a34",
                      "primary-container": "#8c80ff",
                      "tertiary-fixed": "#ffdcc0",
                      "surface-container-lowest": "#090e17",
                      "secondary-fixed-dim": "#40dfa8"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xxl": "32px",
                      "section": "48px",
                      "md": "12px",
                      "page-padding": "20px",
                      "lg": "16px",
                      "xs": "4px",
                      "xl": "24px",
                      "sm": "8px"
              },
              "fontFamily": {
                      "title-md": ["Inter"],
                      "headline-sm": ["Inter"],
                      "label-md": ["Inter"],
                      "display-lg": ["Inter"],
                      "body-lg": ["Inter"],
                      "headline-md": ["Inter"]
              },
              "fontSize": {
                      "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "headline-sm": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                      "display-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-md": ["28px", {"lineHeight": "36px", "fontWeight": "700"}]
              }
            }
          }
        }
    </script>
<style>
        body {
            background-color: #090B10;
        }
        /* Custom styles for OTP inputs to remove arrows and handle focus */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .glass-card {
            background: rgba(22, 28, 37, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col items-center justify-center">
<!-- Mobile Container -->
<div class="w-full max-w-[390px] h-[844px] bg-background relative flex flex-col overflow-hidden shadow-2xl md:rounded-[40px] md:border md:border-surface-variant/30">
<!-- TopAppBar (Transactional - Back arrow only, centered title if provided) -->
<header class="flex justify-between items-center w-full px-page-padding h-[64px] z-50 bg-surface dark:bg-surface">
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-container-low active:opacity-80 transition-opacity text-on-surface-variant">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<div class="font-title-md text-title-md text-on-surface absolute left-1/2 transform -translate-x-1/2">
                Verify email
            </div>
<div class="w-12 h-12"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-page-padding pb-section flex flex-col pt-lg">
<!-- Illustration Area -->
<div class="w-full flex justify-center mb-xl">
<div class="relative w-[120px] h-[120px] rounded-full bg-surface-container-low flex items-center justify-center">
<!-- Subtle Glow -->
<div class="absolute inset-0 bg-primary/10 rounded-full blur-xl"></div>
<!-- Icon -->
<span class="material-symbols-outlined text-[48px] text-primary relative z-10" style="font-variation-settings: 'FILL' 1;">mail</span>
<!-- Checkmark Badge -->
<div class="absolute bottom-2 right-2 w-8 h-8 rounded-full bg-surface flex items-center justify-center shadow-lg border border-surface-variant">
<span class="material-symbols-outlined text-[16px] text-secondary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
<!-- Typography Header -->
<div class="text-center mb-md">
<h1 class="font-headline-sm text-headline-sm text-on-background mb-xs">Check your email</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Enter the six-digit verification code we sent to your email address.</p>
</div>
<!-- Masked Email Info -->
<div class="flex justify-center mb-section">
<div class="inline-flex items-center space-x-2 bg-surface-container px-4 py-2 rounded-full border border-surface-variant/50">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant">alternate_email</span>
<span class="font-label-md text-label-md text-on-surface-variant tracking-wider">h••••@example.com</span>
</div>
</div>
<!-- OTP Input Grid -->
<div class="grid grid-cols-6 gap-2 mb-xl">
<input class="w-full aspect-square bg-surface text-center font-display-lg text-display-lg text-on-background rounded-[14px] border-2 border-surface-variant/50 focus:outline-none" readonly="" type="number" value="1">
<input class="w-full aspect-square bg-surface text-center font-display-lg text-display-lg text-on-background rounded-[14px] border-2 border-surface-variant/50 focus:outline-none" readonly="" type="number" value="2">
<input class="w-full aspect-square bg-surface text-center font-display-lg text-display-lg text-on-background rounded-[14px] border-2 border-surface-variant/50 focus:outline-none" readonly="" type="number" value="3">
<!-- Focused Input -->
<input autofocus="" class="w-full aspect-square bg-surface text-center font-display-lg text-display-lg text-on-background rounded-[14px] border-2 border-primary focus:border-primary focus:ring-0 focus:outline-none transition-colors shadow-[0_0_15px_rgba(198,191,255,0.15)]" placeholder="" type="number">
<input class="w-full aspect-square bg-surface text-center font-display-lg text-display-lg text-on-background rounded-[14px] border-2 border-surface-variant/50 focus:outline-none" placeholder="" type="number">
<input class="w-full aspect-square bg-surface text-center font-display-lg text-display-lg text-on-background rounded-[14px] border-2 border-surface-variant/50 focus:outline-none" placeholder="" type="number">
</div>
<!-- Countdown -->
<div class="text-center mb-section">
<p class="font-label-md text-label-md text-on-surface-variant">
                    You can request a new code in <span class="text-on-surface">00:42</span>
</p>
</div>
<div class="mt-auto space-y-md">
<!-- Primary Action (Disabled State) -->
<button class="w-full h-[52px] rounded-[14px] bg-surface-variant text-on-surface-variant/50 font-label-md text-label-md uppercase tracking-wider cursor-not-allowed transition-colors" disabled="">
                    Verify email
                </button>
<!-- Secondary Action -->
<div class="text-center">
<button class="font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-colors">
                        Wrong email address? <span class="text-primary ml-1">Change email</span>
</button>
</div>
</div>
<!-- Delivery Note Card -->
<div class="mt-xl glass-card rounded-xl p-4 flex items-start space-x-3">
<span class="material-symbols-outlined text-[20px] text-on-surface-variant shrink-0 mt-0.5">info</span>
<p class="font-body-lg text-[14px] leading-snug text-on-surface-variant">
                    The email may take a moment to arrive. Check your spam or junk folder if you do not see it.
                </p>
</div>
</main>
</div>
</body></html>
