<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport">
<title>Pokidoki - Splash Screen</title>
<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#30353f",
                        "primary": "#c6bfff",
                        "on-primary-fixed": "#160066",
                        "on-tertiary": "#4b2800",
                        "on-primary-fixed-variant": "#3f25c1",
                        "on-primary": "#2800a0",
                        "inverse-primary": "#5845d9",
                        "secondary-container": "#00c28e",
                        "on-tertiary-fixed": "#2d1600",
                        "on-secondary-fixed": "#002115",
                        "outline": "#928ea0",
                        "on-tertiary-fixed-variant": "#6b3b00",
                        "secondary-fixed-dim": "#40dfa8",
                        "surface-dim": "#0e141c",
                        "surface-bright": "#343943",
                        "on-tertiary-container": "#412200",
                        "background": "#0e141c",
                        "on-secondary-container": "#004933",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdcc0",
                        "secondary-fixed": "#64fcc3",
                        "on-secondary": "#003827",
                        "on-secondary-fixed-variant": "#005139",
                        "error-container": "#93000a",
                        "surface-container": "#1a2029",
                        "inverse-surface": "#dee2ef",
                        "surface-variant": "#30353f",
                        "tertiary": "#ffb875",
                        "tertiary-container": "#d27c17",
                        "tertiary-fixed-dim": "#ffb875",
                        "on-error": "#690005",
                        "on-surface": "#dee2ef",
                        "surface": "#0e141c",
                        "primary-fixed-dim": "#c6bfff",
                        "on-primary-container": "#22008d",
                        "primary-fixed": "#e4dfff",
                        "inverse-on-surface": "#2b313a",
                        "secondary": "#40dfa8",
                        "error": "#ffb4ab",
                        "surface-tint": "#c6bfff",
                        "surface-container-low": "#161c25",
                        "outline-variant": "#474554",
                        "on-background": "#dee2ef",
                        "on-surface-variant": "#c8c4d7",
                        "surface-container-high": "#252a34",
                        "surface-container-lowest": "#090e17",
                        "primary-container": "#8c80ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xxl": "32px",
                        "page-padding": "20px",
                        "lg": "16px",
                        "xl": "24px",
                        "section": "48px",
                        "xs": "4px",
                        "sm": "8px",
                        "md": "12px"
                    },
                    "fontFamily": {
                        "title-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-sm": ["Inter"]
                    },
                    "fontSize": {
                        "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "headline-md": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-sm": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        .glow-effect {
            box-shadow: 0 0 60px 20px rgba(124, 108, 255, 0.15);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
    </style>
</head>
<body class="bg-[#090B10] text-on-background h-screen w-screen overflow-hidden flex flex-col justify-between items-center pt-safe pb-safe px-page-padding font-body-lg">
<!-- Top Spacer for vertical centering -->
<div class="flex-1"></div>
<!-- Center Content: Logo & Branding -->
<main class="flex flex-col items-center justify-center space-y-xl z-10">
<!-- Shield Icon with Glow -->
<div class="relative w-32 h-32 flex items-center justify-center rounded-full glow-effect bg-transparent">
<!-- Inner subtle background to support the icon -->
<div class="absolute inset-0 bg-[#7C6CFF] opacity-5 rounded-full blur-xl"></div>
<!-- The Shield Icon -->
<span class="material-symbols-outlined text-[#7C6CFF]" data-icon="shield" data-weight="fill" style="font-size: 80px;">shield</span>
</div>
<!-- Typography -->
<div class="text-center space-y-sm">
<h1 class="font-headline-md text-headline-md text-on-background tracking-tight">Pokidoki</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[240px] mx-auto">Private conversations, protected.</p>
</div>
</main>
<!-- Bottom Spacer -->
<div class="flex-1"></div>
<!-- Bottom Content: Loading & Status -->
<footer class="flex flex-col items-center justify-end pb-12 space-y-md w-full">
<!-- Loading Spinner -->
<div class="w-8 h-8 border-2 border-[#7C6CFF]/20 border-t-[#7C6CFF] rounded-full animate-spin"></div>
<!-- Status Text -->
<p class="text-[12px] font-medium leading-tight text-on-surface-variant opacity-80 uppercase tracking-widest">Securing your space</p>
</footer>
<!-- Background Atmospheric Effect -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#7C6CFF]/10 via-[#090B10]/0 to-transparent"></div>
</body></html>
