<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Pokidoki - Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#4b2800",
                        "error": "#ffb4ab",
                        "tertiary-container": "#d27c17",
                        "on-primary-fixed-variant": "#3f25c1",
                        "on-secondary-container": "#004933",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdcc0",
                        "surface": "#0e141c",
                        "inverse-surface": "#dee2ef",
                        "background": "#0e141c",
                        "surface-variant": "#30353f",
                        "on-tertiary-container": "#412200",
                        "secondary-container": "#00c28e",
                        "on-surface-variant": "#c8c4d7",
                        "inverse-on-surface": "#2b313a",
                        "on-tertiary-fixed-variant": "#6b3b00",
                        "secondary": "#40dfa8",
                        "surface-container-highest": "#30353f",
                        "primary-container": "#8c80ff",
                        "on-secondary": "#003827",
                        "surface-bright": "#343943",
                        "on-primary-fixed": "#160066",
                        "primary": "#c6bfff",
                        "on-primary": "#2800a0",
                        "tertiary-fixed-dim": "#ffb875",
                        "surface-container-high": "#252a34",
                        "secondary-fixed": "#64fcc3",
                        "surface-dim": "#0e141c",
                        "error-container": "#93000a",
                        "outline-variant": "#474554",
                        "on-background": "#dee2ef",
                        "on-secondary-fixed": "#002115",
                        "on-error": "#690005",
                        "on-secondary-fixed-variant": "#005139",
                        "surface-tint": "#c6bfff",
                        "inverse-primary": "#5845d9",
                        "secondary-fixed-dim": "#40dfa8",
                        "surface-container-lowest": "#090e17",
                        "on-tertiary-fixed": "#2d1600",
                        "on-surface": "#dee2ef",
                        "surface-container-low": "#161c25",
                        "outline": "#928ea0",
                        "primary-fixed": "#e4dfff",
                        "surface-container": "#1a2029",
                        "on-primary-container": "#22008d",
                        "tertiary": "#ffb875",
                        "primary-fixed-dim": "#c6bfff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "xxl": "32px",
                        "xl": "24px",
                        "xs": "4px",
                        "lg": "16px",
                        "section": "48px",
                        "page-padding": "20px",
                        "md": "12px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "title-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-sm": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "title-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "headline-sm": ["24px", { "lineHeight": "32px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #090B10; /* surface-container-lowest equivalent */
            color: #dee2ef; /* on-background equivalent */
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-background min-h-screen pb-section">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background flex items-center justify-between px-page-padding h-16 shadow-none">
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-variant/20 active:scale-95 transition-transform text-primary">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary">Account</h1>
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-variant/20 active:scale-95 transition-transform text-primary">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</header>
<!-- Main Content -->
<main class="pt-20 px-page-padding space-y-section">
<!-- Profile Header -->
<section class="flex flex-col items-center pt-lg">
<div class="relative mb-lg">
<div class="w-24 h-24 rounded-full bg-surface-container-high flex items-center justify-center border-2 border-surface-variant shadow-sm">
<span class="font-headline-md text-headline-md text-on-surface">ZC</span>
</div>
<button class="absolute bottom-0 right-0 w-8 h-8 rounded-full bg-primary flex items-center justify-center shadow-sm border border-surface-container-lowest active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-primary text-sm" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-xs">Zed Clay</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-md">@zedclay</p>
<div class="flex items-center gap-xs bg-[#32D6A0]/10 px-md py-xs rounded-full border border-[#32D6A0]/20">
<span class="material-symbols-outlined text-[#32D6A0] text-sm" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-md text-label-md text-[#32D6A0]">Account protected</span>
</div>
</section>
<!-- Section 1: Public Identity -->
<section class="bg-surface-container-low rounded-xl overflow-hidden shadow-sm">
<div class="px-lg py-md border-b border-surface-variant/30 bg-surface-container/50">
<h3 class="font-title-md text-title-md text-primary">Public identity</h3>
</div>
<div class="flex flex-col">
<!-- Display Name -->
<button class="flex items-center justify-between px-lg py-lg hover:bg-surface-variant/10 active:bg-surface-variant/20 transition-colors text-left border-b border-surface-variant/10">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant mb-xs">Display name</span>
<span class="font-body-lg text-body-lg text-on-surface">Zed Clay</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">edit</span>
</button>
<!-- Username -->
<button class="flex items-center justify-between px-lg py-lg hover:bg-surface-variant/10 active:bg-surface-variant/20 transition-colors text-left border-b border-surface-variant/10">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant mb-xs">Username</span>
<span class="font-body-lg text-body-lg text-on-surface">@zedclay</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">edit</span>
</button>
<!-- Pokidoki ID -->
<div class="flex items-center justify-between px-lg py-lg border-b border-surface-variant/10">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant mb-xs">Pokidoki ID</span>
<span class="font-body-lg text-body-lg text-on-surface font-mono">PKD-84A7-19ZX</span>
</div>
<button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-variant/20 active:scale-95 transition-transform text-primary">
<span class="material-symbols-outlined">content_copy</span>
</button>
</div>
<!-- QR Code -->
<button class="flex items-center gap-md px-lg py-lg hover:bg-surface-variant/10 active:bg-surface-variant/20 transition-colors text-left border-b border-surface-variant/10">
<span class="material-symbols-outlined text-primary text-xl">qr_code</span>
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-on-surface">My Pokidoki QR</span>
<span class="font-label-md text-label-md text-on-surface-variant">Share your public Pokidoki identity</span>
</div>
</button>
<!-- Preview Public Profile -->
<button class="flex items-center gap-md px-lg py-lg hover:bg-surface-variant/10 active:bg-surface-variant/20 transition-colors text-left">
<span class="material-symbols-outlined text-primary text-xl">visibility</span>
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-on-surface">Preview public profile</span>
<span class="font-label-md text-label-md text-on-surface-variant">See what other Pokidoki users can view</span>
</div>
</button>
</div>
</section>
<!-- Section 2: Sign-in and Recovery -->
<section class="bg-surface-container-low rounded-xl overflow-hidden shadow-sm">
<div class="px-lg py-md border-b border-surface-variant/30 bg-surface-container/50">
<h3 class="font-title-md text-title-md text-primary">Sign-in and recovery</h3>
</div>
<div class="flex flex-col">
<!-- Email -->
<button class="flex items-center justify-between px-lg py-lg hover:bg-surface-variant/10 active:bg-surface-variant/20 transition-colors text-left border-b border-surface-variant/10">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant mb-xs">Email address</span>
<span class="font-body-lg text-body-lg text-on-surface">z••••••@example.com</span>
</div>
<div class="flex items-center gap-xs px-2 py-1 rounded-md bg-[#32D6A0]/10">
<span class="material-symbols-outlined text-[#32D6A0] text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-md text-[12px] text-[#32D6A0]">Verified</span>
</div>
</button>
<!-- Password -->
<button class="flex items-center justify-between px-lg py-lg hover:bg-surface-variant/10 active:bg-surface-variant/20 transition-colors text-left border-b border-surface-variant/10">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant mb-xs">Password</span>
<span class="font-body-lg text-body-lg text-on-surface">Changed 3 months ago</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
<!-- Account Recovery -->
<button class="flex items-center gap-md px-lg py-lg hover:bg-surface-variant/10 active:bg-surface-variant/20 transition-colors text-left border-b border-surface-variant/10">
<span class="material-symbols-outlined text-primary text-xl">shield_person</span>
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-on-surface">Account recovery</span>
<span class="font-label-md text-label-md text-on-surface-variant">Review recovery and verification options</span>
</div>
</button>
<!-- Info Card -->
<div class="p-lg bg-surface-container/30 border-t border-surface-variant/20 flex gap-md items-start">
<span class="material-symbols-outlined text-on-surface-variant text-lg shrink-0 mt-1">info</span>
<p class="font-label-md text-[13px] leading-relaxed text-on-surface-variant">
                        Your app PIN and account password are different. The app PIN unlocks Pokidoki on this device. Your account password is used to sign in to your account.
                    </p>
</div>
</div>
</section>
</main>
</body></html>
