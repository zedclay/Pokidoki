<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Pokidoki - Confirm PIN</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#ffdcc0",
                        "inverse-primary": "#5845d9",
                        "surface-container-high": "#252a34",
                        "on-primary-fixed": "#160066",
                        "surface-tint": "#c6bfff",
                        "tertiary-container": "#d27c17",
                        "primary-container": "#8c80ff",
                        "on-surface": "#dee2ef",
                        "primary-fixed": "#e4dfff",
                        "surface-container": "#1a2029",
                        "outline-variant": "#474554",
                        "inverse-surface": "#dee2ef",
                        "inverse-on-surface": "#2b313a",
                        "primary": "#c6bfff",
                        "on-error-container": "#ffdad6",
                        "on-surface-variant": "#c8c4d7",
                        "outline": "#928ea0",
                        "secondary-fixed-dim": "#40dfa8",
                        "surface-dim": "#0e141c",
                        "on-error": "#690005",
                        "surface-bright": "#343943",
                        "on-background": "#dee2ef",
                        "error": "#ffb4ab",
                        "secondary-fixed": "#64fcc3",
                        "surface-variant": "#30353f",
                        "on-tertiary-fixed-variant": "#6b3b00",
                        "on-tertiary-container": "#412200",
                        "secondary": "#40dfa8",
                        "on-primary": "#2800a0",
                        "tertiary-fixed-dim": "#ffb875",
                        "tertiary": "#ffb875",
                        "on-secondary-fixed": "#002115",
                        "background": "#0e141c",
                        "on-tertiary": "#4b2800",
                        "primary-fixed-dim": "#c6bfff",
                        "surface": "#0e141c",
                        "on-tertiary-fixed": "#2d1600",
                        "on-primary-container": "#22008d",
                        "secondary-container": "#00c28e",
                        "error-container": "#93000a",
                        "surface-container-lowest": "#090e17",
                        "on-secondary": "#003827",
                        "surface-container-highest": "#30353f",
                        "on-primary-fixed-variant": "#3f25c1",
                        "surface-container-low": "#161c25",
                        "on-secondary-fixed-variant": "#005139",
                        "on-secondary-container": "#004933"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section": "48px",
                        "page-padding": "20px",
                        "md": "12px",
                        "lg": "16px",
                        "xxl": "32px",
                        "xs": "4px",
                        "sm": "8px",
                        "xl": "24px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "title-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "headline-md": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "headline-sm": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "title-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #090B10; color: #dee2ef; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .filled-icon { font-variation-settings: 'FILL' 1; }
        
        /* Custom Glassmorphism styles */
        .glass-panel {
            background: rgba(18, 21, 28, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Keypad press animation */
        .keypad-btn:active {
            transform: scale(0.92);
            background-color: rgba(48, 53, 63, 0.8);
        }
    </style>
</head>
<body class="bg-surface-container-lowest antialiased flex flex-col h-screen overflow-hidden selection:bg-primary/30">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-page-padding h-16 bg-surface-container-lowest shrink-0">
<button aria-label="Go back" class="w-12 h-12 flex items-center justify-start text-on-surface-variant hover:bg-surface-variant/20 rounded-full transition-colors active:scale-95 duration-150 ease-in-out">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-on-surface flex-1 text-center pr-12">Confirm app PIN</h1>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-page-padding pt-xl pb-section overflow-y-auto">
<!-- Header Section -->
<div class="flex flex-col items-center text-center space-y-md mb-xxl">
<!-- Security Illustration with Confirmation Check -->
<div class="w-24 h-24 mb-sm relative rounded-full glass-panel flex items-center justify-center shadow-[0_0_30px_rgba(198,191,255,0.05)]">
<span class="material-symbols-outlined text-4xl text-primary filled-icon">lock</span>
<div class="absolute -bottom-1 -right-1 w-8 h-8 rounded-full bg-surface-container-lowest flex items-center justify-center">
<div class="w-6 h-6 rounded-full bg-secondary flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary text-sm font-bold">check</span>
</div>
</div>
</div>
<h2 class="font-headline-sm text-headline-sm text-on-surface">Confirm your app PIN</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px]">Enter the same six-digit PIN again to make sure you remember it.</p>
</div>
<!-- PIN Indicators Section -->
<div class="flex flex-col items-center justify-center flex-1 mt-auto">
<div class="flex space-x-lg mb-xl">
<!-- Filled indicators (3) -->
<div class="w-4 h-4 rounded-full bg-primary shadow-[0_0_10px_rgba(198,191,255,0.3)] transition-all duration-200"></div>
<div class="w-4 h-4 rounded-full bg-primary shadow-[0_0_10px_rgba(198,191,255,0.3)] transition-all duration-200"></div>
<div class="w-4 h-4 rounded-full bg-primary shadow-[0_0_10px_rgba(198,191,255,0.3)] transition-all duration-200"></div>
<!-- Empty indicators (3) -->
<div class="w-4 h-4 rounded-full border-2 border-outline-variant bg-surface transition-all duration-200"></div>
<div class="w-4 h-4 rounded-full border-2 border-outline-variant bg-surface transition-all duration-200"></div>
<div class="w-4 h-4 rounded-full border-2 border-outline-variant bg-surface transition-all duration-200"></div>
</div>
<!-- Stable Feedback Area -->
<div class="h-6 flex items-center justify-center">
<p class="font-label-md text-label-md text-on-surface-variant animate-pulse">Enter all six digits to continue</p>
</div>
</div>
<!-- Spacer -->
<div class="flex-1 min-h-[40px]"></div>
<!-- Numeric Keypad -->
<div class="grid grid-cols-3 gap-y-6 gap-x-12 mb-xxl mx-auto w-full max-w-[320px]">
<!-- Row 1 -->
<button class="keypad-btn font-headline-md text-headline-md text-on-surface w-16 h-16 rounded-full flex items-center justify-center mx-auto transition-all duration-150">1</button>
<button class="keypad-btn font-headline-md text-headline-md text-on-surface w-16 h-16 rounded-full flex items-center justify-center mx-auto transition-all duration-150">2</button>
<button class="keypad-btn font-headline-md text-headline-md text-on-surface w-16 h-16 rounded-full flex items-center justify-center mx-auto transition-all duration-150">3</button>
<!-- Row 2 -->
<button class="keypad-btn font-headline-md text-headline-md text-on-surface w-16 h-16 rounded-full flex items-center justify-center mx-auto transition-all duration-150">4</button>
<button class="keypad-btn font-headline-md text-headline-md text-on-surface w-16 h-16 rounded-full flex items-center justify-center mx-auto transition-all duration-150">5</button>
<button class="keypad-btn font-headline-md text-headline-md text-on-surface w-16 h-16 rounded-full flex items-center justify-center mx-auto transition-all duration-150">6</button>
<!-- Row 3 -->
<button class="keypad-btn font-headline-md text-headline-md text-on-surface w-16 h-16 rounded-full flex items-center justify-center mx-auto transition-all duration-150">7</button>
<button class="keypad-btn font-headline-md text-headline-md text-on-surface w-16 h-16 rounded-full flex items-center justify-center mx-auto transition-all duration-150">8</button>
<button class="keypad-btn font-headline-md text-headline-md text-on-surface w-16 h-16 rounded-full flex items-center justify-center mx-auto transition-all duration-150">9</button>
<!-- Row 4 -->
<div class="w-16 h-16 mx-auto"></div> <!-- Empty space -->
<button class="keypad-btn font-headline-md text-headline-md text-on-surface w-16 h-16 rounded-full flex items-center justify-center mx-auto transition-all duration-150">0</button>
<button aria-label="Delete" class="keypad-btn w-16 h-16 rounded-full flex items-center justify-center mx-auto text-on-surface-variant transition-all duration-150">
<span class="material-symbols-outlined text-2xl">backspace</span>
</button>
</div>
<!-- Action Buttons -->
<div class="flex flex-col space-y-md mt-auto pb-4">
<!-- Disabled Primary Action -->
<button class="w-full h-[52px] rounded-[14px] bg-surface-variant text-on-surface-variant opacity-50 cursor-not-allowed font-label-md text-label-md flex items-center justify-center transition-all duration-200" disabled="">
                Confirm PIN
            </button>
<!-- Secondary Action -->
<button class="w-full h-[52px] rounded-[14px] bg-transparent text-primary font-label-md text-label-md flex items-center justify-center hover:bg-primary/10 transition-colors">
                Choose a different PIN
            </button>
</div>
</main>
</body></html>
